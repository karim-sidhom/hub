<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1a6e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="قيادة">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230d1a6e' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%23F4AF4D'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <title>قيادة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(180deg, #0d1a6e 0%, #020b2e 50%, #0d1a6e 100%);
            color: #fff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(244, 175, 77, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(244, 175, 77, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .shimmer-top {
            position: absolute;
            top: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #F4AF4D 20%, 
                #FFD700 40%,
                #F4AF4D 60%,
                #FFAA00 80%,
                transparent 100%);
            box-shadow: 0 0 30px rgba(244, 175, 77, 0.8), 
                        inset 0 0 15px rgba(255, 215, 0, 0.4);
            z-index: 20;
        }

        .shimmer-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #F4AF4D 20%, 
                #FFD700 40%,
                #F4AF4D 60%,
                #FFAA00 80%,
                transparent 100%);
            box-shadow: 0 0 30px rgba(244, 175, 77, 0.8),
                        inset 0 0 15px rgba(255, 215, 0, 0.4);
            z-index: 20;
        }

        .ornament-corner {
            position: fixed;
            font-size: 6rem;
            opacity: 0.12;
            z-index: 1;
            pointer-events: none;
        }

        .ornament-tl {
            top: 30px;
            right: 15px;
            animation: rotate 30s linear infinite;
        }

        .ornament-br {
            bottom: 30px;
            left: 15px;
            animation: rotate 30s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header {
            padding: 2.5rem 1rem 1.5rem;
            text-align: center;
            position: relative;
            z-index: 20;
        }

        .header-decoration {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .decoration-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #F4AF4D 50%, transparent 100%);
            box-shadow: 0 0 10px rgba(244, 175, 77, 0.6);
        }

        .decoration-dot {
            width: 8px;
            height: 8px;
            background: #F4AF4D;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(244, 175, 77, 0.8);
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #F4AF4D 0%, #FFD700 50%, #F4AF4D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
            text-shadow: 0 2px 8px rgba(244, 175, 77, 0.3);
        }

        .header-title {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #F4AF4D 0%, #FFAA00 25%, #FFD700 50%, #FFAA00 75%, #F4AF4D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.8rem;
            letter-spacing: 3px;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
            filter: drop-shadow(0 4px 12px rgba(244, 175, 77, 0.4));
        }

        .subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            color: rgba(244, 175, 77, 0.9);
            font-weight: 500;
            letter-spacing: 1px;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s backwards;
        }

        .quran-verse {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            padding: 2rem 1.5rem;
            border: 2px solid #F4AF4D;
            background: linear-gradient(135deg, rgba(244, 175, 77, 0.15) 0%, rgba(255, 215, 0, 0.08) 100%);
            border-radius: 20px;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
            box-shadow: 0 0 30px rgba(244, 175, 77, 0.6),
                        inset 0 0 20px rgba(244, 175, 77, 0.2),
                        0 0 60px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .quran-verse::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(244, 175, 77, 0.1) 25%,
                rgba(255, 215, 0, 0.15) 50%,
                rgba(244, 175, 77, 0.1) 75%,
                transparent 100%);
            animation: shine 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .quran-verse::after {
            content: '✦ ✦ ✦';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: #F4AF4D;
            letter-spacing: 8px;
            opacity: 0.6;
            text-shadow: 0 0 10px rgba(244, 175, 77, 0.8);
        }

        .verse-arabic {
            font-family: 'Amiri', serif;
            font-size: 1.3rem;
            color: #F4AF4D;
            font-weight: 700;
            line-height: 2;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 6px rgba(244, 175, 77, 0.2);
        }

        .verse-translation {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            color: rgba(244, 175, 77, 0.85);
            font-style: italic;
            line-height: 1.6;
        }

        .verse-reference {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            color: rgba(244, 175, 77, 0.7);
            margin-top: 0.8rem;
            text-align: center;
            font-weight: 600;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1.5rem;
            max-width: 100%;
        }

        .menu {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.2rem;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s backwards;
            padding-right: 0.5rem;
        }

        .menu.hidden {
            display: none;
        }

        .app-card {
            background: linear-gradient(135deg, rgba(13, 26, 110, 0.6) 0%, rgba(2, 11, 46, 0.7) 100%);
            border: 3px solid #F4AF4D;
            border-radius: 25px;
            padding: 2rem 1.5rem 2.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: visible;
            box-shadow: 0 8px 24px rgba(244, 175, 77, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1),
                        0 0 20px rgba(244, 175, 77, 0.5),
                        inset 0 0 15px rgba(244, 175, 77, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 200px;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(244, 175, 77, 0.2) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .app-card::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(244, 175, 77, 0);
            border-radius: 23px;
            transition: border-color 0.4s ease;
            pointer-events: none;
        }

        .app-card:hover {
            background: linear-gradient(135deg, rgba(244, 175, 77, 0.15) 0%, rgba(255, 215, 0, 0.08) 100%);
            transform: translateY(-12px);
            box-shadow: 0 16px 40px rgba(244, 175, 77, 0.35),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2),
                        0 0 40px rgba(244, 175, 77, 0.8),
                        0 0 60px rgba(255, 215, 0, 0.5),
                        inset 0 0 25px rgba(244, 175, 77, 0.2);
            border-color: #FFD700;
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card:hover::after {
            border-color: rgba(244, 175, 77, 0.3);
        }

        .app-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            animation: fadeUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .app-card:hover .app-icon {
            transform: scale(1.15) rotateZ(5deg);
        }

        .app-name {
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: #FFD700;
            word-break: break-word;
            position: relative;
            z-index: 1;
            line-height: 1.6;
            text-shadow: 0 0 10px #F4AF4D,
                        0 0 20px #FFD700,
                        0 0 30px rgba(244, 175, 77, 0.9),
                        0 0 40px #F4AF4D,
                        0 2px 6px rgba(0, 0, 0, 0.4);
            filter: drop-shadow(0 0 5px #F4AF4D)
                    drop-shadow(0 0 10px #FFD700)
                    drop-shadow(0 0 15px rgba(244, 175, 77, 0.8));
            letter-spacing: 1px;
            margin-top: 0.8rem;
        }

        .app-card:hover .app-name {
            color: #FFFF99;
            text-shadow: 0 0 15px #FFD700,
                        0 0 30px #F4AF4D,
                        0 0 50px rgba(255, 215, 0, 1),
                        0 0 70px #F4AF4D,
                        0 2px 6px rgba(0, 0, 0, 0.4);
            filter: drop-shadow(0 0 8px #FFD700)
                    drop-shadow(0 0 15px #F4AF4D)
                    drop-shadow(0 0 25px rgba(255, 215, 0, 0.9));
        }

        .app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .app-frame.active {
            display: block;
            animation: fadeUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .home-btn {
            background: linear-gradient(135deg, #F4AF4D 0%, #FFD700 50%, #FFAA00 100%);
            border: 2px solid #FFE566;
            padding: 0.8rem 1.8rem;
            border-radius: 30px;
            color: #0d1a6e;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(244, 175, 77, 0.5),
                        inset 0 -2px 4px rgba(0, 0, 0, 0.2);
            display: none;
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            font-family: 'Tajawal', sans-serif;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(244, 175, 77, 0.6),
                        inset 0 -2px 4px rgba(0, 0, 0, 0.2);
        }

        .home-btn:active {
            transform: scale(0.97);
        }

        .home-btn.show {
            display: block;
            animation: fadeUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 800px) {
            .header-title {
                font-size: 2.5rem;
            }

            .bismillah {
                font-size: 1.1rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .menu {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 1rem;
                max-width: 100%;
            }

            .app-card {
                padding: 1.5rem 1rem;
            }

            .app-icon {
                font-size: 2.5rem;
                margin-bottom: 0.8rem;
            }

            .app-name {
                font-size: 0.95rem;
            }

            .home-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
                top: 1rem;
                right: 1rem;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 1.5rem 0.8rem 1rem;
            }

            .header-title {
                font-size: 2rem;
                letter-spacing: 1px;
            }

            .decoration-line {
                width: 40px;
            }

            .menu {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
                padding: 0;
            }

            .app-card {
                padding: 1.2rem 0.8rem;
                border-radius: 18px;
            }

            .app-icon {
                font-size: 2rem;
                margin-bottom: 0.6rem;
            }

            .app-name {
                font-size: 0.85rem;
            }
        }

        /* Scrollbar styling */
        .menu::-webkit-scrollbar {
            width: 8px;
        }

        .menu::-webkit-scrollbar-track {
            background: rgba(244, 175, 77, 0.08);
            border-radius: 10px;
        }

        .menu::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #F4AF4D 0%, #FFD700 100%);
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(244, 175, 77, 0.4);
        }

        .menu::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #FFD700 0%, #FFAA00 100%);
        }
    </style>
</head>
<body>
    <div class="ornament-corner ornament-tl">✦</div>
    <div class="ornament-corner ornament-br">✦</div>

    <div class="app-container">
        <div class="shimmer-top"></div>

        <div class="header" id="header">
            <div class="bismillah">بسم الله الرحمن الرحيم</div>
            
            <div class="quran-verse">
                <div class="verse-arabic">إن هذا القرآن يهدي للتي هي أقوم</div>
                <div class="verse-reference">سورة الإسراء - الآية 9</div>
            </div>

            <div class="header-decoration">
                <div class="decoration-line"></div>
                <div class="decoration-dot"></div>
                <div class="decoration-line"></div>
            </div>
            <div class="header-title">قيادة</div>
            <div class="subtitle">نظام التطبيقات المتكاملة</div>
        </div>

        <div class="content">
            <div class="menu" id="menu"></div>
            <iframe id="appFrame" class="app-frame"></iframe>
        </div>

        <button class="home-btn" id="homeBtn">← العودة</button>
        <div class="shimmer-bottom"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }

        const apps = [
            { name: 'الباطري', url: 'https://albaytari.kieda.online', icon: '🐾' },
            { name: 'المصرفي', url: 'https://masrifi.kieda.online', icon: '🏦' },
            { name: 'الإذاعة', url: 'https://idhaati.kieda.online', icon: '📻' },
            { name: 'المترجم', url: 'https://moutarjem.kieda.online', icon: '🗣️' },
            { name: 'التغذية', url: 'https://maydati.kieda.online', icon: '🍎' },
            { name: 'الترجمة', url: 'https://traducteur.kieda.online', icon: '🌐' },
            { name: 'النظارة', url: 'https://nadharatioptic.kieda.online', icon: '👓' },
            { name: 'إسطنبول', url: 'https://istanbulharissaedition.kieda.online', icon: '🕌' },
            { name: 'الذكاء الاصطناعي', url: 'https://IA.kieda.online', icon: '🤖' },
            { name: 'IAE', url: 'https://IAE.kieda.online', icon: '⚙️' },
            { name: 'طبيب الأسنان', url: 'https://dentiste.kieda.online', icon: '🦷' },
            { name: 'الجمياتي', url: 'https://JAMIIATI.kieda.online', icon: '👥' },
            { name: 'الضروري', url: 'https://essential.kieda.online', icon: '⚡' },
            { name: 'Médecin Généraliste', url: 'https://tabibialam.kieda.online', icon: '🏥' },
            { name: 'الطوارئ', url: 'https://urgence-test.kieda.online', icon: '🚑' },
            { name: 'الدابي', url: 'https://dabi.kieda.online', icon: '🏧' },
            { name: 'الصيدلية', url: 'https://saydaliati.kieda.online', icon: '💊' },
            { name: 'المحطات', url: 'https://mahattati.kieda.online', icon: '⛽' },
            { name: 'الصلاة', url: 'https://salati.kieda.online', icon: '🕌' }
        ];

        const menu = document.getElementById('menu');
        const appFrame = document.getElementById('appFrame');
        const homeBtn = document.getElementById('homeBtn');
        const header = document.getElementById('header');

        apps.forEach((app, i) => {
            const card = document.createElement('div');
            card.className = 'app-card';
            card.style.animation = `fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.5 + i * 0.06}s backwards`;
            card.innerHTML = `
                <span class="app-icon">${app.icon}</span>
                <div class="app-name">${app.name}</div>
            `;
            card.addEventListener('click', () => {
                appFrame.src = app.url;
                appFrame.classList.add('active');
                menu.classList.add('hidden');
                header.style.display = 'none';
                homeBtn.classList.add('show');
            });
            menu.appendChild(card);
        });

        homeBtn.addEventListener('click', () => {
            appFrame.src = '';
            appFrame.classList.remove('active');
            menu.classList.remove('hidden');
            header.style.display = 'block';
            homeBtn.classList.remove('show');
        });
    </script>
</body>
</html>
